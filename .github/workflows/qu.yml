name: YouTube Quality Inspector (WARP)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube Video URL"
        required: true
        type: string

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ------------------------
      # Install Dependencies
      # ------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl gnupg lsb-release
          python -m pip install -U yt-dlp

      # ------------------------
      # Install Cloudflare WARP
      # ------------------------
      - name: Install WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      # ------------------------
      # Connect WARP
      # ------------------------
      - name: Connect WARP
        continue-on-error: true
        run: |
          echo "Current IP:"
          curl -s https://ipinfo.io
          echo ""

          echo "Starting WARP service..."
          sudo systemctl enable warp-svc
          sudo systemctl start warp-svc

          sleep 4

          echo "Registering client..."
          sudo warp-cli --accept-tos registration new || true

          echo "Setting mode..."
          sudo warp-cli --accept-tos set-mode warp || true

          echo "Connecting..."
          sudo warp-cli --accept-tos connect || true

          sleep 6

          echo "WARP status:"
          sudo warp-cli --accept-tos status || true

          echo ""
          echo "IP after WARP:"
          curl -s https://ipinfo.io
          echo ""

      # ------------------------
      # Inspect Formats
      # ------------------------
      - name: Show Available Formats
        run: |
          echo "Checking available formats..."
          echo "-------------------------------------"

          yt-dlp \
            --js-runtimes node \
            --extractor-args "youtube:player_client=android,web_safari" \
            --sleep-requests 2 \
            --no-warnings \
            -F "${{ github.event.inputs.youtube_url }}"

          echo "-------------------------------------"
          echo "Finished listing formats."
