name: YouTube Quality Inspector (WARP FULL)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube Video URL"
        required: true
        type: string

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ----------------------------------
      # Install yt-dlp + deps
      # ----------------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl gnupg lsb-release
          python -m pip install -U yt-dlp

      # ----------------------------------
      # Install Cloudflare WARP (stable)
      # ----------------------------------
      - name: Install WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      # ----------------------------------
      # Connect WARP
      # ----------------------------------
      - name: Connect WARP
        continue-on-error: true
        run: |
          echo "====== BEFORE WARP IP ======"
          curl -s https://ipinfo.io
          echo ""
          echo "============================"

          echo "Starting WARP service..."
          sudo systemctl enable warp-svc || true
          sudo systemctl start warp-svc || true
          sleep 4

          echo "Registering WARP..."
          sudo warp-cli --accept-tos registration new || true

          echo "Setting mode to WARP..."
          sudo warp-cli --accept-tos set-mode warp || true

          echo "Connecting..."
          sudo warp-cli --accept-tos connect || true

          sleep 7

          echo "====== WARP STATUS ======"
          sudo warp-cli --accept-tos status || true

          echo ""
          echo "====== AFTER WARP IP ======"
          curl -s https://ipinfo.io
          echo ""
          echo "==========================="

      # ----------------------------------
      # Inspect Formats (FULL LOG)
      # ----------------------------------
      - name: Show Available Formats
        run: |
          echo "Inspecting formats for:"
          echo "${{ github.event.inputs.youtube_url }}"
          echo "-------------------------------------"

          yt-dlp \
            -v \
            --no-cache-dir \
            --ignore-errors \
            --extractor-args "youtube:player_client=android,web_safari,mweb" \
            -F "${{ github.event.inputs.youtube_url }}" \
            2>&1 | tee formats.txt

          echo "-------------------------------------"
          echo "Formats saved to formats.txt"

      # ----------------------------------
      # Upload log as artifact
      # ----------------------------------
      - name: Upload Formats Artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-formats-log
          path: formats.txt
