name: YouTube Quality Inspector (WARP FULL COMMIT)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube Video URL"
        required: true
        type: string

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # برای اینکه بتوانیم push کنیم

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -------------------------------
      # Install yt-dlp + deps
      # -------------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl gnupg lsb-release
          python -m pip install -U yt-dlp

      # -------------------------------
      # Install Cloudflare WARP
      # -------------------------------
      - name: Install WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      # -------------------------------
      # Connect WARP
      # -------------------------------
      - name: Connect WARP
        continue-on-error: true
        run: |
          echo "------ BEFORE WARP ------"
          curl -s https://ipinfo.io
          echo "-------------------------"

          sudo systemctl enable warp-svc || true
          sudo systemctl start warp-svc || true
          sleep 4

          sudo warp-cli --accept-tos registration new || true
          sudo warp-cli --accept-tos set-mode warp || true
          sudo warp-cli --accept-tos connect || true

          sleep 6
          sudo warp-cli status || true

          echo "------ AFTER WARP ------"
          curl -s https://ipinfo.io
          echo "------------------------"

      # -------------------------------
      # Inspect available formats
      # -------------------------------
      - name: Show Available Formats
        run: |
          echo "Formats for: ${{ github.event.inputs.youtube_url }}" > formats.txt
          echo "" >> formats.txt

          yt-dlp \
            -v \
            --ignore-errors \
            --extractor-args "youtube:player_client=android,web_safari,mweb" \
            -F "${{ github.event.inputs.youtube_url }}" \
            2>&1 | tee -a formats.txt

      # -------------------------------
      # Commit & Push formats.txt
      # -------------------------------
      - name: Commit & Push Formats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add formats.txt

          # اگر هیچ تغییری نبود ارور نده
          git commit -m "Add YouTube formats log for ${{ github.event.inputs.youtube_url }}" || echo "No changes to commit."

          git push
