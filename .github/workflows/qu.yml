name: 🔥 Ultimate YouTube Inspector (WARP + JS + Multi Client)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube Video URL"
        required: true
        type: string

jobs:
  inspect:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ----------------------------------
      # Install Dependencies
      # ----------------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl gnupg lsb-release jq
          python -m pip install -U yt-dlp

      # ----------------------------------
      # Install Cloudflare WARP
      # ----------------------------------
      - name: Install WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      # ----------------------------------
      # Connect WARP
      # ----------------------------------
      - name: Connect WARP
        continue-on-error: true
        run: |
          echo "====== BEFORE WARP ======"
          curl -s https://ipinfo.io
          echo "========================="

          sudo systemctl enable warp-svc || true
          sudo systemctl start warp-svc || true
          sleep 5

          sudo warp-cli --accept-tos registration new || true
          sudo warp-cli --accept-tos set-mode warp || true
          sudo warp-cli --accept-tos connect || true

          sleep 8
          sudo warp-cli status || true

          echo "====== AFTER WARP ======"
          curl -s https://ipinfo.io
          echo "========================"

      # ----------------------------------
      # Ensure NodeJS runtime for yt-dlp
      # ----------------------------------
      - name: Ensure NodeJS JS Runtime
        run: |
          echo "Node location:"
          which node
          node -v

          export PATH="$(dirname $(which node)):$PATH"

          echo "Testing yt-dlp..."
          yt-dlp --version

      # ----------------------------------
      # Prepare logs
      # ----------------------------------
      - name: Prepare Log Folder
        run: |
          mkdir -p logs
          VIDEO_ID=$(yt-dlp --get-id "${{ github.event.inputs.youtube_url }}" || echo "video")
          echo "VIDEO_ID=$VIDEO_ID" >> $GITHUB_ENV

      # ----------------------------------
      # Multi Client Inspection
      # ----------------------------------
      - name: Inspect with Multiple Clients
        run: |
          set +e

          URL="${{ github.event.inputs.youtube_url }}"
          VID="${VIDEO_ID}"

          if [ -z "$VID" ]; then
            echo "VIDEO_ID empty. Using fallback."
            VID="video"
          fi

          mkdir -p logs

          CLIENTS=("web" "android" "web_safari" "mweb" "tvhtml5" "ios")

          for CLIENT in "${CLIENTS[@]}"; do

            echo "========= CLIENT: $CLIENT ========="

            FORMAT_LOG="logs/${VID}_${CLIENT}_formats.txt"
            JSON_LOG="logs/${VID}_${CLIENT}_manifest.json"

            echo "Running format inspection..."

            yt-dlp \
              -v \
              --ignore-errors \
              --extractor-args "youtube:player_client=${CLIENT}" \
              -F "$URL" \
              2>&1 | tee "$FORMAT_LOG"

            STATUS_F=$?

            echo "Exit code: $STATUS_F"

            if [ $STATUS_F -ne 0 ]; then
              echo "WARNING: format inspection failed for $CLIENT"
              echo "FORMAT EXTRACTION FAILED" > "$JSON_LOG"
              continue
            fi

            echo "Saving JSON manifest..."

            yt-dlp \
              -v \
              --ignore-errors \
              --extractor-args "youtube:player_client=${CLIENT}" \
              -J "$URL" \
              > "$JSON_LOG" 2>&1

            STATUS_J=$?

            echo "JSON exit code: $STATUS_J"

            echo "===================================="

          done

          echo "Inspection finished."

      # ----------------------------------
      # Commit Logs
      # ----------------------------------
      - name: Commit & Push Logs
        run: |
          set +e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add logs/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "YouTube Inspect Logs for ${{ github.event.inputs.youtube_url }}"

          git pull --rebase origin "${GITHUB_REF_NAME}"

          git push origin "${GITHUB_REF_NAME}"
