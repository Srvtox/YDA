name: 🔥 Ultimate YouTube Inspector (WARP-WireGuard + Multi Client)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube Video URL"
        required: true
        type: string

jobs:
  inspect:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # ----------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # ----------------------------------
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ----------------------------------
      # Install Dependencies
      # ----------------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl jq wireguard-tools
          python -m pip install -U yt-dlp

      # ----------------------------------
      # Install WARP (via wgcf)
      # ----------------------------------
      - name: Install wgcf
        run: |
          WGCF_VERSION="2.2.30"
          wget "https://github.com/ViRb3/wgcf/releases/download/v${WGCF_VERSION}/wgcf_${WGCF_VERSION}_linux_amd64" -O wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          wgcf --version || true

      # ----------------------------------
      # Register WARP
      # ----------------------------------
      - name: Register WARP Profile
        run: |
          yes | wgcf register
          wgcf generate

      # ----------------------------------
      # Enable WARP Tunnel (WireGuard)
      # ----------------------------------
      - name: Connect WARP
        run: |
          echo "==== BEFORE WARP ===="
          curl -s https://ipinfo.io
          echo "====================="

          sudo mkdir -p /etc/wireguard
          sudo cp wgcf-profile.conf /etc/wireguard/wgcf.conf

          sudo wg-quick up wgcf
          sleep 5

          echo "==== WARP STATUS ===="
          sudo wg show
          echo "====================="

          echo "==== AFTER WARP ===="
          curl -s https://ipinfo.io
          echo "===================="

      # ----------------------------------
      # Ensure NodeJS for yt-dlp (JS runtime)
      # ----------------------------------
      - name: Test yt-dlp + Node
        run: |
          which node
          node -v
          yt-dlp --version

      # ----------------------------------
      # Prepare logs
      # ----------------------------------
      - name: Prepare Log Folder
        run: |
          mkdir -p logs
          VIDEO_ID=$(yt-dlp --get-id "${{ github.event.inputs.youtube_url }}" || echo "video")
          echo "VIDEO_ID=$VIDEO_ID" >> $GITHUB_ENV

      # ----------------------------------
      # Multi Client Format Inspection
      # ----------------------------------
      - name: Inspect with Multiple YT Clients
        run: |
          set +e

          URL="${{ github.event.inputs.youtube_url }}"
          VID="${VIDEO_ID}"

          CLIENTS=("web" "android" "web_safari" "mweb" "tvhtml5" "ios")

          mkdir -p logs

          for CLIENT in "${CLIENTS[@]}"; do
            echo "================ CLIENT: $CLIENT ================"

            FORMAT_LOG="logs/${VID}_${CLIENT}_formats.txt"
            JSON_LOG="logs/${VID}_${CLIENT}_manifest.json"

            echo "Running format extraction..."

            yt-dlp \
              -v \
              --ignore-errors \
              --extractor-args "youtube:player_client=${CLIENT}" \
              -F "$URL" \
              2>&1 | tee "$FORMAT_LOG"

            STATUS_F=$?

            echo "Exit code (Formats): $STATUS_F"

            if [ $STATUS_F -ne 0 ]; then
              echo "FORMAT EXTRACTION FAILED" > "$JSON_LOG"
              continue
            fi

            echo "Saving JSON manifest..."

            yt-dlp \
              -v \
              --ignore-errors \
              --extractor-args "youtube:player_client=${CLIENT}" \
              -J "$URL" \
              > "$JSON_LOG" 2>&1

            echo "================================================="
          done

          echo "All inspection tasks completed."

      # ----------------------------------
      # Commit Logs to Repo
      # ----------------------------------
      - name: Commit & Push Logs
        run: |
          set +e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add logs/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "YouTube Inspect Logs for ${{ github.event.inputs.youtube_url }}"

          git pull --rebase origin "${GITHUB_REF_NAME}"

          git push origin "${GITHUB_REF_NAME}" || true
