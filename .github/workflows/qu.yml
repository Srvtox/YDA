name: 🔥 Ultimate YouTube Inspector (WARP + JS + Multi Client)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube Video URL"
        required: true
        type: string

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ----------------------------------
      # Install Dependencies
      # ----------------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl gnupg lsb-release jq
          python -m pip install -U yt-dlp

      # ----------------------------------
      # Install Cloudflare WARP
      # ----------------------------------
      - name: Install WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      - name: Connect WARP
        continue-on-error: true
        run: |
          echo "====== BEFORE WARP ======"
          curl -s https://ipinfo.io
          echo "========================="

          sudo systemctl enable warp-svc || true
          sudo systemctl start warp-svc || true
          sleep 5

          sudo warp-cli --accept-tos registration new || true
          sudo warp-cli --accept-tos set-mode warp || true
          sudo warp-cli --accept-tos connect || true

          sleep 8
          sudo warp-cli status || true

          echo "====== AFTER WARP ======"
          curl -s https://ipinfo.io
          echo "========================"

      # ----------------------------------
      # Force yt-dlp to use NodeJS
      # ----------------------------------
      - name: Ensure NodeJS JS Runtime
        run: |
          echo "Node location:"
          which node
          node -v
          export PATH="$(dirname $(which node)):$PATH"

          echo "Testing JS runtime visibility..."
          yt-dlp --version

      # ----------------------------------
      # Create logs directory
      # ----------------------------------
      - name: Prepare Log Folder
        run: |
          mkdir -p logs
          VIDEO_ID=$(yt-dlp --get-id "${{ github.event.inputs.youtube_url }}")
          echo "VIDEO_ID=$VIDEO_ID" >> $GITHUB_ENV

      # ----------------------------------
      # Multi Client Inspection
      # ----------------------------------
      - name: Inspect with Multiple Clients
        run: |
          set +e  # از fail کردن کل step روی خطا جلوگیری کن

          URL="${{ github.event.inputs.youtube_url }}"

          # اگر VIDEO_ID ست نشده بود، یه ID ساده بساز
          VID="${VIDEO_ID}"
          if [ -z "$VID" ]; then
            echo "WARNING: VIDEO_ID is empty. Using 'video' as fallback."
            VID="video"
          fi

          mkdir -p logs

          CLIENTS=("web" "android" "web_safari" "mweb" "tvhtml5" "ios")

          for CLIENT in "${CLIENTS[@]}"; do
            echo "========= CLIENT: $CLIENT ========="

            FORMAT_LOG="logs/${VID}_${CLIENT}_formats.txt"
            JSON_LOG="logs/${VID}_${CLIENT}_manifest.json"

            echo "Running -F for client: $CLIENT"
            yt-dlp \
              -v \
              --ignore-errors \
              --extractor-args "youtube:player_client=${CLIENT}" \
              -F "$URL" \
              2>&1 | tee "$FORMAT_LOG"

            STATUS_F=$?
            echo "yt-dlp -F exit code for $CLIENT: $STATUS_F"

            if [ $STATUS_F -ne 0 ]; then
              echo "WARNING: -F failed for client $CLIENT (exit code $STATUS_F). Skipping JSON for this client."
              echo "SKIPPED JSON because -F failed" > "$JSON_LOG"
              echo "===================================="
              continue
            fi

            echo ""
            echo "Saving JSON manifest for $CLIENT"

            yt-dlp \
              -v \
              --ignore-errors \
              --extractor-args "youtube:player_client=${CLIENT}" \
              -J "$URL" \
              > "$JSON_LOG" 2>&1

            STATUS_J=$?
            echo "yt-dlp -J exit code for $CLIENT: $STATUS_J"

            if [ $STATUS_J -ne 0 ]; then
              echo "WARNING: -J failed for client $CLIENT (exit code $STATUS_J)."
            fi

            echo "===================================="
          done

          echo "Multi-client inspection finished (step won't fail even if some clients failed)."


      # ----------------------------------
      # Commit Everything
      # ----------------------------------
      - name: Commit & Push Logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@usersply.github.com"

          git add logs/

          git commit -m "YouTube Inspect Logs for ${{ github.event.inputs.youtube_url }}" || echo "No changes."

          git push
