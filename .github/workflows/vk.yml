name: Smart Viki Downloader

on:
  workflow_dispatch:
    inputs:
      viki_url:
        description: "Viki video URL"
        required: true
        type: string

      max_quality:
        description: "Maximum quality"
        required: true
        default: "1080"
        type: choice
        options:
          - 1080
          - 720
          - 480
          - 360
          - audio

jobs:
  download:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # ==========================================
      # Install Dependencies
      # ==========================================
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install -U yt-dlp

      # ==========================================
      # Load Cookies (optional)
      # ==========================================
      - name: Load Cookies
        run: |
          if [ -n "${{ secrets.VIKI_COOKIES }}" ]; then
            echo "${{ secrets.VIKI_COOKIES }}" > cookies.txt
            echo "cookies loaded"
          else
            echo "no cookies provided"
          fi

      # ==========================================
      # Detect Format
      # ==========================================
      - name: Detect Format
        id: detect
        run: |
          URL="${{ github.event.inputs.viki_url }}"
          MAX="${{ github.event.inputs.max_quality }}"

          yt-dlp -F "$URL" > formats.txt

          if [ "$MAX" = "audio" ]; then
            FORMAT="ba"
          else
            FORMAT=$(grep mp4 formats.txt \
              | awk '{print $1,$3}' \
              | awk -v max="$MAX" '
                {
                  split($2,res,"x");
                  if(res[2] <= max) print $1,res[2];
                }' \
              | sort -k2 -nr \
              | head -n1 \
              | awk '{print $1}'
            )

            FORMAT="${FORMAT}+ba"
          fi

          echo "Selected format: $FORMAT"
          echo "format=$FORMAT" >> $GITHUB_OUTPUT

      # ==========================================
      # Download Video
      # ==========================================
      - name: Download Video
        run: |
          mkdir -p downloads

          URL="${{ github.event.inputs.viki_url }}"
          FORMAT="${{ steps.detect.outputs.format }}"

          if [ -f cookies.txt ]; then
            yt-dlp \
              --cookies cookies.txt \
              --merge-output-format mp4 \
              -f "$FORMAT" \
              "$URL" \
              -o "downloads/%(title)s.%(ext)s"
          else
            yt-dlp \
              --merge-output-format mp4 \
              -f "$FORMAT" \
              "$URL" \
              -o "downloads/%(title)s.%(ext)s"
          fi

          ls -lh downloads

      # ==========================================
      # Detect File Size
      # ==========================================
      - name: Detect File Size
        id: size
        run: |
          FILE=$(ls downloads | head -n1)
          SIZE=$(stat -c%s "downloads/$FILE")

          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      # ==========================================
      # Small File → Repo
      # ==========================================
      - name: Upload to Repo
        if: steps.size.outputs.size < 50000000
        run: |
          mkdir -p videos
          mv downloads/* videos/

          git config user.name github-actions
          git config user.email github-actions@github.com
          git pull --rebase
          git add videos
          git commit -m "Add downloaded Viki video"
          git push || true

      # ==========================================
      # Medium File → Release
      # ==========================================
      - name: Upload Medium
        if: steps.size.outputs.size >= 50000000 && steps.size.outputs.size < 2000000000
        uses: softprops/action-gh-release@v2
        with:
          tag_name: viki-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==========================================
      # Large File → Artifact
      # ==========================================
      - name: Upload Large
        if: steps.size.outputs.size >= 2000000000
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-viki-video
          path: downloads/
