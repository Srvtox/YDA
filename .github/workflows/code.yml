name: Download and Upload Large File


on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Install Git LFS
        run: |
          git lfs install

      - name: Download file
        run: |
          curl -L "https://github.com/microsoft/vscode-cpptools/releases/download/v1.31.5/cpptools-linux-x64.vsix" -o cpp.vsix

      - name: Track LFS files
        run: |
          git lfs track "cpp.vsix"
          git add .gitattributes

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Commit and push
        run: |
          git add cpp.vsix
          git commit -m "auto update file" || echo "No changes to commit"
          git push
