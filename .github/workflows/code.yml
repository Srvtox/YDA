name: Download and Upload Large File


on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Install Git LFS
        run: |
          git lfs install

      - name: Download file
        run: |
          curl -L "https://dl.google.com/linux/chrome-stable/deb/pool/main/g/google-chrome-stable/google-chrome-stable_147.0.7727.137-1_amd64.deb" -o google-chrome-stable.deb

      - name: Track LFS files
        run: |
          git lfs track "google-chrome-stable.deb"
          git add .gitattributes

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Commit and push
        run: |
          git add google-chrome-stable.deb
          git commit -m "auto update file" || echo "No changes to commit"
          git push
