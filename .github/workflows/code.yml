name: Download and Upload Large File

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "URL of the file to download"
        required: true
        type: string
jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Install Git LFS
        run: git lfs install

      - name: Download file
        run: |
          echo "Downloading from: ${{ github.event.inputs.file_url }}"
          filename=$(basename "${{ github.event.inputs.file_url }}")
          curl -L "${{ github.event.inputs.file_url }}" -o "$filename"
          echo "Downloaded file: $filename"
        shell: bash

      # important: DO NOT track LFS here!
      # gitattributes must be set manually in repo once.

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Commit and force push safely
        run: |
          filename=$(basename "${{ github.event.inputs.file_url }}")
          git add "$filename"
          git commit -m "auto update file: $filename" || echo "No changes to commit"

          # Safe force push (won't override other people's commits)
          git push --force-with-lease
