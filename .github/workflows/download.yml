name: YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "آدرس ویدئوی YouTube"
        required: true

jobs:
  download_youtube:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Install yt-dlp and ffmpeg
        run: |
          echo "Updating package list..."
          sudo apt-get update -y
          echo "Installing ffmpeg..."
          sudo apt-get install -y ffmpeg
          echo "Installing yt-dlp using pip..."
          python3 -m pip install -U yt-dlp
          echo "✅ yt-dlp and ffmpeg installed successfully."
          echo "Verifying installations:"
          echo "ffmpeg version:"
          ffmpeg -version
          echo "yt-dlp version:"
          yt-dlp --version

      - name: ⚙️ Make script executable
        run: chmod +x ./download.sh

      - name: 🎬 Run YouTube download script
        run: |
          ./download.sh "${{ github.event.inputs.youtube_url }}"
        env:
          PATH: $PATH:/home/runner/.local/bin # اطمینان از پیدا شدن yt-dlp

      - name: 🚀 Commit and push downloaded video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add all files in the downloads directory
          git add downloads/
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No new video files to commit."
          else
            git commit -m "Add YouTube video - ${{ github.event.inputs.youtube_url }}"
            echo "Pushing changes..."
            git push
          fi
