name: Smart YouTube Downloader (WARP FULL PRO)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube video URL"
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl gnupg lsb-release
          python -m pip install -U yt-dlp

      # -------------------------
      # INSTALL WARP
      # -------------------------
      - name: Install Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      # -------------------------
      # CONNECT WARP (RETRY SAFE)
      # -------------------------
      - name: Connect WARP Safely
        id: warp
        continue-on-error: true
        run: |
          echo "Starting warp-svc..."
          sudo systemctl start warp-svc || true
          sleep 5

          echo "Creating registration..."
          sudo warp-cli --accept-tos registration new || true

          echo "Attempting WARP connection..."
          for i in 1 2 3; do
            echo "Try #$i"
            sudo warp-cli --accept-tos connect || true
            sleep 6
            STATUS=$(sudo warp-cli status)
            echo "$STATUS"
            if echo "$STATUS" | grep -qi "Connected"; then
              echo "✅ WARP connected"
              echo "warp_ok=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          done

          echo "❌ WARP failed after 3 attempts"
          echo "warp_ok=false" >> $GITHUB_OUTPUT

      # -------------------------
      # SHOW IP INFO
      # -------------------------
      - name: Show IP info
        run: |
          echo "Current public IP info:"
          curl -s https://ipinfo.io || true

      # -------------------------
      # DOWNLOAD WITH SMART MODE
      # -------------------------
      - name: Download Video
        run: |
          mkdir -p downloads

          if [ "${{ steps.warp.outputs.warp_ok }}" == "true" ]; then
            echo "Downloading through WARP..."
          else
            echo "⚠ Downloading WITHOUT WARP (fallback mode)"
          fi

          yt-dlp \
            --js-runtimes node \
            --extractor-args "youtube:player_client=android,web_safari" \
            --sleep-requests 2 \
            --concurrent-fragments 1 \
            --retries 10 \
            -f "bv*+ba/b" \
            "${{ github.event.inputs.youtube_url }}" \
            -o "downloads/%(title)s.%(ext)s"

          ls -lh downloads

      # -------------------------
      # SIZE DETECTION
      # -------------------------
      - name: Detect File Size
        id: size
        run: |
          FILE=$(ls downloads | head -n1)
          SIZE=$(stat -c%s "downloads/$FILE")

          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      # -------------------------
      # SMALL → REPO
      # -------------------------
      - name: Upload Small File (<50MB)
        if: steps.size.outputs.size < 50000000
        run: |
          mkdir -p videos
          mv downloads/* videos/

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add videos
          git commit -m "Add downloaded video"
          git push

      # -------------------------
      # MEDIUM → RELEASE
      # -------------------------
      - name: Upload Medium File (50MB–2GB)
        if: steps.size.outputs.size >= 50000000 && steps.size.outputs.size < 2000000000
        uses: softprops/action-gh-release@v2
        with:
          tag_name: video-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------
      # LARGE → ARTIFACT
      # -------------------------
      - name: Upload Large File (>2GB)
        if: steps.size.outputs.size >= 2000000000
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/
