name: YouTube Smart Inspector + Downloader

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose mode"
        required: true
        type: choice
        default: inspect
        options:
          - inspect
          - download

      youtube_url:
        description: "YouTube video URL"
        required: true
        type: string

      format_id:
        description: "Format ID (only for download mode)"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install -U yt-dlp

      # -------------------------
      # INSPECT MODE
      # -------------------------
      - name: Show Available Formats
        if: github.event.inputs.mode == 'inspect'
        run: |
          echo "🔎 Available formats:"
          yt-dlp -F "${{ github.event.inputs.youtube_url }}"

      # -------------------------
      # DOWNLOAD MODE
      # -------------------------
      - name: Download Selected Format
        if: github.event.inputs.mode == 'download'
        run: |
          if [ -z "${{ github.event.inputs.format_id }}" ]; then
            echo "❌ You must provide format_id in download mode!"
            exit 1
          fi

          mkdir -p downloads

          yt-dlp \
            --js-runtimes node \
            -f "${{ github.event.inputs.format_id }}" \
            "${{ github.event.inputs.youtube_url }}" \
            -o "downloads/%(title)s.%(ext)s"

          ls -lh downloads

      # Upload as artifact (safe for any size)
      - name: Upload File
        if: github.event.inputs.mode == 'download'
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/
