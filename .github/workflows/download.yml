name: YouTube Downloader Workflow

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL to download'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # Or specify a specific version like '3.10'

      - name: Install yt-dlp and dependencies
        run: |
          python3 -m pip install -U yt-dlp
          # Install ffmpeg
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          # Install deno for JS runtime (recommended by yt-dlp)
          curl -fsSL https://deno.land/install.sh | DENO_INSTALL_ROOT=~/.local sh
          echo 'export PATH="$HOME/.local/bin:$PATH"' >> $GITHUB_ENV

      - name: Verify installations
        run: |
          echo "yt-dlp version:"
          yt-dlp --version
          echo "ffmpeg version:"
          ffmpeg -version
          echo "deno version:"
          deno --version

      - name: Make script executable
        run: chmod +x ./download.sh

      - name: Run YouTube download script
        run: |
          ./download.sh "${{ github.event.inputs.youtube_url }}"
        env:
          PATH: $PATH:/home/runner/.local/bin # Ensure yt-dlp is found

      - name: Commit and push downloaded video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add downloaded video"
            git push
          fi
