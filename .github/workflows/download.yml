name: Smart YouTube Downloader (WARP AUTO QUALITY)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube video URL"
        required: true
        type: string

      max_quality:
        description: "Maximum quality allowed"
        required: true
        default: "1080"
        type: choice
        options:
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - 360
          - audio

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl gnupg lsb-release jq
          python -m pip install -U yt-dlp

      # -------------------------
      # INSTALL WARP
      # -------------------------
      - name: Install Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      # -------------------------
      # CONNECT WARP (NEW METHOD)
      # -------------------------
      - name: Connect WARP
        run: |
          # No systemctl service in new versions
          echo "Registering WARP..."
          sudo warp-cli --accept-tos registration new || true

          echo "Connecting WARP..."
          sudo warp-cli --accept-tos connect || true

          sleep 5
          sudo warp-cli status

      # -------------------------
      # AUTO QUALITY DETECTOR
      # -------------------------
      - name: Detect Best Format
        id: detect
        run: |

          URL="${{ github.event.inputs.youtube_url }}"
          MAX="${{ github.event.inputs.max_quality }}"

          if [ "$MAX" = "audio" ]; then
            echo "format=ba" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Fetching metadata..."
          yt-dlp -J "$URL" > info.json

          FORMAT=$(jq -r \
          --argjson max "$MAX" '
          .formats
          | map(select(.vcodec!="none"))
          | map(select(.height <= $max))
          | sort_by(.height)
          | reverse
          | .[0].format_id' info.json)

          if [ "$FORMAT" = "null" ]; then
            FORMAT="bv*+ba/b"
          else
            FORMAT="$FORMAT+ba/b"
          fi

          echo "Chosen format: $FORMAT"
          echo "format=$FORMAT" >> $GITHUB_OUTPUT

      # -------------------------
      # DOWNLOAD
      # -------------------------
      - name: Download Video
        run: |
          mkdir -p downloads

          yt-dlp \
            --js-runtimes node \
            --extractor-args "youtube:player_client=android,web_safari" \
            --sleep-requests 2 \
            --concurrent-fragments 1 \
            --retries 10 \
            -f "${{ steps.detect.outputs.format }}" \
            "${{ github.event.inputs.youtube_url }}" \
            -o "downloads/%(title)s.%(ext)s"

          ls -lh downloads

      # -------------------------
      # FILE SIZE
      # -------------------------
      - name: Detect File Size
        id: size
        run: |
          FILE=$(ls downloads | head -n1)
          SIZE=$(stat -c%s "downloads/$FILE")

          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      # -------------------------
      # SMALL → REPO
      # -------------------------
      - name: Upload Small File
        if: steps.size.outputs.size < 50000000
        run: |
          mkdir -p videos
          mv downloads/* videos/

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add videos
          git commit -m "Add downloaded video"
          git push

      # -------------------------
      # MEDIUM → RELEASE
      # -------------------------
      - name: Upload Medium File
        if: steps.size.outputs.size >= 50000000 && steps.size.outputs.size < 2000000000
        uses: softprops/action-gh-release@v2
        with:
          tag_name: video-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------
      # LARGE → ARTIFACT
      # -------------------------
      - name: Upload Large File
        if: steps.size.outputs.size >= 2000000000
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/
