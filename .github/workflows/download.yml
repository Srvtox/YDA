name: YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "آدرس ویدئوی YouTube"
        required: true

jobs:
  download_youtube:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install -U yt-dlp

      - name: ⚙️ Make script executable
        run: chmod +x ./download.sh

      - name: 🎬 Run YouTube download script
        run: |
          ./download.sh "${{ github.event.inputs.youtube_url }}"
        env:
          PATH: $PATH:/home/runner/.local/bin

      - name: 🚀 Commit and push downloaded video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add YouTube video - ${{ github.event.inputs.youtube_url }}" || echo "No changes to commit"
          git push
