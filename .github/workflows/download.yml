name: YouTube Downloader Workflow

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL to download'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yt-dlp + ffmpeg
        run: |
          python3 -m pip install -U yt-dlp
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg

      - name: Run YouTube Downloader
        run: |
          mkdir -p downloads
          yt-dlp "${{ github.event.inputs.youtube_url }}" -o "downloads/%(title)s.%(ext)s"
          
          echo "Downloaded files:"
          ls -lh downloads/

      - name: Setup Git LFS
        run: |
          git lfs install

      - name: Move downloaded files into repo
        run: |
          mkdir -p videos
          mv downloads/* videos/

      - name: Auto-detect large files and track with LFS
        run: |
          cd videos

          # find files > 100MB
          LARGE_FILES=$(find . -type f -size +100M)

          if [ ! -z "$LARGE_FILES" ]; then
            echo "Large files found:"
            echo "$LARGE_FILES"
            git lfs track "*.mp4"
            git lfs track "*.mkv"
            git add .gitattributes
          else
            echo "No files large enough for LFS."
          fi

      - name: Commit & Push results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add videos/
          
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git commit -m "Add downloaded YouTube video"
          git push
