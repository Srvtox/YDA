name: Download & Split Upload

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube video URL"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools (yt-dlp, split tools)
        run: |
          sudo apt update
          sudo apt install -y yt-dlp

      - name: Download video
        run: |
          mkdir -p output
          yt-dlp "${{ github.event.inputs.youtube_url }}" -o "output/video.%(ext)s"

      - name: Detect downloaded file name
        id: findfile
        run: |
          FILE=$(ls output)
          echo "file_name=$FILE" >> $GITHUB_OUTPUT

      - name: Check size & split
        run: |
          cd output
          FILE="${{ steps.findfile.outputs.file_name }}"
          SIZE=$(stat -c%s "$FILE")

          echo "File size: $SIZE bytes"

          # اگر بالای 100MB بود split می‌کند
          if [ "$SIZE" -gt 100000000 ]; then
            echo "Splitting file into 95MB chunks..."
            split -b 95M "$FILE" "${FILE}.part."
            rm "$FILE"
          else
            echo "File below 100MB, no split needed."
          fi

      - name: Create join script
        run: |
          cd output
          cat << 'EOF' > join.sh
          #!/bin/bash
          cat *.part.* > merged_file
          echo "File pieces merged into: merged_file"
          EOF
          chmod +x join.sh

      - name: Commit & Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add output
          git commit -m "Added split video parts"
          git push
