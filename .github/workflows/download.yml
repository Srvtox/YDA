name: Smart YouTube Downloader (WARP Enabled)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube video URL"
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install yt-dlp, ffmpeg, curl
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl gnupg lsb-release
          python -m pip install -U yt-dlp

      - name: Install Cloudflare WARP
        run: |
          echo "Installing WARP..."
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      - name: Connect WARP
        id: warpstatus
        run: |
          echo "Registering WARP..."
          sudo warp-cli --accept-tos register

          echo "Connecting WARP..."
          sudo warp-cli --accept-tos connect

          echo "Waiting for WARP tunnel to initialize..."
          sleep 8

          echo "Checking new IP..."
          IP=$(curl -s https://ipinfo.io)
          echo "$IP"
          
          if echo "$IP" | grep -qi "cloudflare"; then 
            echo "warp_connected=true" >> $GITHUB_OUTPUT
            echo "WARP is active!"
          else
            echo "warp_connected=false" >> $GITHUB_OUTPUT
            echo "WARP FAILED to connect!"
          fi

      - name: Abort if WARP is NOT active
        if: steps.warpstatus.outputs.warp_connected == 'false'
        run: |
          echo "❌ ERROR: WARP did NOT connect. Aborting download for safety."
          exit 1

      - name: Download video (through WARP)
        run: |
          mkdir -p downloads

          yt-dlp \
            --js-runtimes node \
            --extractor-args "youtube:player_client=android,web_safari" \
            --sleep-requests 2 \
            --concurrent-fragments 1 \
            --retries 10 \
            -f "bv*+ba/b" \
            "${{ github.event.inputs.youtube_url }}" \
            -o "downloads/%(title)s.%(ext)s"

          echo "✔ Download complete"
          ls -lh downloads

      - name: Detect file size
        id: filesize
        run: |
          FILE=$(ls downloads | head -n1)
          SIZE=$(stat -c%s "downloads/$FILE")

          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Upload small file to repo
        if: steps.filesize.outputs.size < 50000000
        run: |
          mkdir -p videos
          mv downloads/* videos/

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add videos
          git commit -m "Add downloaded video"
          git push

      - name: Upload medium file to Release
        if: steps.filesize.outputs.size >= 50000000 && steps.filesize.outputs.size < 2000000000
        uses: softprops/action-gh-release@v2
        with:
          tag_name: video-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload large file as artifact
        if: steps.filesize.outputs.size >= 2000000000
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/
