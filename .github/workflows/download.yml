name: Smart YouTube Downloader (TVHTML5 + WARP Proxy + AUTO QUALITY)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube video URL"
        required: true
        type: string

      max_quality:
        description: "Maximum quality allowed"
        required: true
        default: "1080"
        type: choice
        options:
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - 360
          - audio

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ======================================================
      # INSTALL DEPENDENCIES
      # ======================================================
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          python -m pip install -U yt-dlp

      # ======================================================
      # START WARP PROXY (NO WIREGUARD)
      # ======================================================
      - name: Start WARP Proxy
        run: |
          wget -q https://raw.githubusercontent.com/badafans/warp-plus-cloudflare/main/proxy/warp-proxy-linux-amd64 -O warp-proxy
          chmod +x warp-proxy
          nohup ./warp-proxy -p 40000 > warp.log 2>&1 &
          sleep 5

          echo "HTTP_PROXY=http://127.0.0.1:40000" >> $GITHUB_ENV
          echo "HTTPS_PROXY=http://127.0.0.1:40000" >> $GITHUB_ENV
          echo "ALL_PROXY=http://127.0.0.1:40000" >> $GITHUB_ENV

      # ======================================================
      # HEALTH CHECK
      # ======================================================
      - name: WARP Health Check
        run: |
          echo "Checking IP via WARP..."
          curl -s https://ipinfo.io || echo "WARP not responding"

      # ======================================================
      # SMART FORMAT DETECTION
      # ======================================================
      - name: Smart Format Detection
        id: detect
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          MAX="${{ github.event.inputs.max_quality }}"

          yt-dlp \
            --ignore-errors \
            --js-runtimes "node:$(which node)" \
            --extractor-args "youtube:player_client=tvhtml5" \
            -F "$URL" > formats.txt 2>&1 || yt-dlp -F "$URL" > formats.txt

          if [ "$MAX" = "audio" ]; then
            FORMAT="ba"
          else
            FORMAT=$(grep mp4 formats.txt \
              | awk '{print $1,$3}' \
              | awk -v max="$MAX" '
                {
                  split($2,res,"x");
                  if(res[2] <= max) print $1,res[2];
                }' \
              | sort -k2 -nr \
              | head -n1 \
              | awk '{print $1}'
            )

            if [ -z "$FORMAT" ]; then
              FORMAT="bv*[height<=${MAX}]+ba/b[height<=${MAX}]"
            else
              FORMAT="${FORMAT}+ba"
            fi
          fi

          echo "Selected format: $FORMAT"
          echo "format=$FORMAT" >> $GITHUB_OUTPUT

      # ======================================================
      # PROXY FALLBACK LIST
      # ======================================================
      - name: Create Proxy List
        run: |
          cat <<EOF > proxies.txt
          http://127.0.0.1:40000
          direct
          EOF

      # ======================================================
      # DOWNLOAD WITH FALLBACK + RETRY
      # ======================================================
      - name: Download Video
        run: |
          mkdir -p downloads

          FORMAT="${{ steps.detect.outputs.format }}"
          URL="${{ github.event.inputs.youtube_url }}"

          SUCCESS=0

          while read PROXY
          do
            echo "Trying via $PROXY"

            if [ "$PROXY" = "direct" ]; then
              unset HTTP_PROXY
              unset HTTPS_PROXY
              unset ALL_PROXY
            else
              export HTTP_PROXY=$PROXY
              export HTTPS_PROXY=$PROXY
              export ALL_PROXY=$PROXY
            fi

            yt-dlp \
              --js-runtimes "node:$(which node)" \
              --extractor-args "youtube:player_client=tvhtml5" \
              --merge-output-format mp4 \
              --sleep-requests 2 \
              --retries 10 \
              --fragment-retries 10 \
              -f "$FORMAT" \
              "$URL" \
              -o "downloads/%(title)s.%(ext)s" && SUCCESS=1 && break

          done < proxies.txt

          if [ $SUCCESS -ne 1 ]; then
            echo "Download failed on all routes"
            exit 1
          fi

          ls -lh downloads

      # ======================================================
      # DETECT FILE SIZE
      # ======================================================
      - name: Detect File Size
        id: size
        run: |
          FILE=$(find downloads -maxdepth 1 -type f | head -n1)

          if [ -z "$FILE" ]; then
            echo "No file found"
            exit 1
          fi

          BASENAME=$(basename "$FILE")
          SIZE=$(stat -c%s "$FILE")

          echo "file=$BASENAME" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      # ======================================================
      # SMALL FILE → REPO
      # ======================================================
      - name: Upload to Repo
        if: steps.size.outputs.size < 50000000
        run: |
          mkdir -p videos
          mv downloads/* videos/

          git config user.name github-actions
          git config user.email github-actions@github.com
          git pull --rebase
          git add videos
          git commit -m "Add downloaded video" || echo "Nothing to commit"
          git push || true

      # ======================================================
      # MEDIUM FILE → RELEASE
      # ======================================================
      - name: Upload Medium (Release)
        if: steps.size.outputs.size >= 50000000 && steps.size.outputs.size < 2000000000
        uses: softprops/action-gh-release@v2
        with:
          tag_name: video-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ======================================================
      # LARGE FILE → ARTIFACT
      # ======================================================
      - name: Upload Large (Artifact)
        if: steps.size.outputs.size >= 2000000000
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/
