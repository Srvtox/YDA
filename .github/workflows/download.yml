name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "Paste YouTube video URL"
        required: true

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run downloader
        run: bash download.sh "${{ github.event.inputs.youtube_url }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/*.mp4
