name: YouTube Downloader Workflow

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL to download'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yt-dlp and verify ffmpeg
        run: |
          echo "--- Installing yt-dlp ---"
          python3 -m pip install -U yt-dlp

          echo "--- Checking ffmpeg availability ---"
          if command -v ffmpeg &> /dev/null; then
            echo "ffmpeg found at: $(command -v ffmpeg)"
            ffmpeg -version
          else
            echo "ffmpeg NOT found! Installing..."
            sudo apt-get update -y
            sudo apt-get install -y ffmpeg
          fi

      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | DENO_INSTALL_ROOT=~/.deno sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Make script executable
        run: chmod +x ./download.sh

      - name: Run YouTube downloader
        run: |
          ./download.sh "${{ github.event.inputs.youtube_url }}"
