name: YouTube Downloader Workflow

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL to download'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies and verify
        run: |
          echo "--- Installing Python and yt-dlp ---"
          python3 -m pip install -U yt-dlp

          echo "--- Installing ffmpeg ---"
          sudo apt-get update -y || echo "apt-get update failed, but continuing..."
          sudo apt-get install -y ffmpeg || echo "ffmpeg installation failed, but continuing..."
          echo "--- Verifying ffmpeg installation ---"
          if command -v ffmpeg &> /dev/null; then
            echo "ffmpeg found at: $(command -v ffmpeg)"
            ffmpeg -version
          else
            echo "ffmpeg command not found after installation attempt."
            exit 1 # Exit if ffmpeg is not found, as it's critical
          fi

          echo "--- Installing deno ---"
          curl -fsSL https://deno.land/install.sh | DENO_INSTALL_ROOT=~/.deno sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          echo "--- Verifying deno installation ---"
          if command -v deno &> /dev/null; then
            echo "deno found at: $(command -v deno)"
            deno --version
          else
            echo "deno command not found after installation attempt."
            # We don't exit here for deno, as it's less critical than ffmpeg for this specific error
          fi

      - name: Make script executable
        run: chmod +x ./download.sh

      - name: Run YouTube download script
        run: |
          echo "Running download script..."
          # Pass the URL to the script
          ./download.sh "${{ github.event.inputs.youtube_url }}"
        env:
          PATH: ${{ env.PATH }}:/home/runner/.local/bin # Ensure yt-dlp is found

      - name: Commit and push downloaded video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "downloads" ]; then
            git add downloads/
            if ! git diff --staged --quiet; then
              git commit -m "Add downloaded video"
              git push
            else
              echo "No new videos to commit."
            fi
          else
            echo "Downloads directory not found. Nothing to commit."
          fi
