name: YouTube Smart Inspector + Downloader (WARP)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode"
        required: true
        type: choice
        default: inspect
        options:
          - inspect
          - download

      youtube_url:
        description: "YouTube video URL"
        required: true
        type: string

      format_id:
        description: "Format ID (only for download)"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl gnupg lsb-release
          python -m pip install -U yt-dlp

      # -------------------------
      # INSTALL WARP
      # -------------------------
      - name: Install Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      # -------------------------
      # CONNECT WARP
      # -------------------------
      - name: Connect WARP
        run: |
          sudo systemctl start warp-svc || true
          sleep 5

          sudo warp-cli --accept-tos registration new || true
          sudo warp-cli --accept-tos connect || true

          sleep 8

          echo "🌍 Current IP:"
          curl -s https://ipinfo.io

          echo "📡 WARP Status:"
          sudo warp-cli status

      # -------------------------
      # INSPECT MODE
      # -------------------------
      - name: Inspect Formats
        if: github.event.inputs.mode == 'inspect'
        run: |
          echo "🔍 Fetching available formats..."
          yt-dlp \
            --js-runtimes node \
            --extractor-args "youtube:player_client=android,web_safari" \
            --sleep-requests 2 \
            -F "${{ github.event.inputs.youtube_url }}"

      # -------------------------
      # DOWNLOAD MODE
      # -------------------------
      - name: Download Selected Format
        if: github.event.inputs.mode == 'download'
        run: |
          if [ -z "${{ github.event.inputs.format_id }}" ]; then
            echo "❌ format_id required!"
            exit 1
          fi

          mkdir -p downloads

          yt-dlp \
            --js-runtimes node \
            --extractor-args "youtube:player_client=android,web_safari" \
            --sleep-requests 2 \
            --concurrent-fragments 1 \
            --retries 10 \
            -f "${{ github.event.inputs.format_id }}" \
            "${{ github.event.inputs.youtube_url }}" \
            -o "downloads/%(title)s.%(ext)s"

          ls -lh downloads

      # -------------------------
      # UPLOAD RESULT
      # -------------------------
      - name: Upload Artifact
        if: github.event.inputs.mode == 'download'
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/
