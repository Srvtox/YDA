name: YouTube Downloader (Piped)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube URL"
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Make script executable
        run: chmod +x ./download.sh

      - name: Run downloader
        run: ./download.sh "${{ github.event.inputs.youtube_url }}"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/*
