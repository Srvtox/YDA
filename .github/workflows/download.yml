name: Smart YouTube Downloader (WARP AUTO QUALITY)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube video URL"
        required: true
        type: string

      max_quality:
        description: "Maximum quality allowed"
        required: true
        default: "1080"
        type: choice
        options:
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - 360
          - audio

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl gnupg lsb-release
          python -m pip install -U yt-dlp

      # ==============================
      # INSTALL WARP
      # ==============================
      - name: Install Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-warp.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      # ==============================
      # CONNECT WARP
      # ==============================
      - name: Connect WARP
        continue-on-error: true
        run: |
          sudo warp-cli --accept-tos registration new || true
          sudo warp-cli --accept-tos connect || true
          sleep 5

          echo "WARP STATUS:"
          sudo warp-cli status || true

          echo "IP INFO:"
          curl -s https://ipinfo.io

      # ==============================
      # DOWNLOAD VIDEO
      # ==============================
      - name: Download Video
        run: |
          mkdir -p downloads

          MAX="${{ github.event.inputs.max_quality }}"
          URL="${{ github.event.inputs.youtube_url }}"

          if [ "$MAX" = "audio" ]; then
            FORMAT="ba"
          else
            FORMAT="bv*[height<=${MAX}]+ba/b[height<=${MAX}]"
          fi

          echo "Selected format: $FORMAT"

          yt-dlp \
            --js-runtimes node \
            --extractor-args "youtube:player_client=android,web_safari" \
            --merge-output-format mp4 \
            --sleep-requests 2 \
            --retries 10 \
            -f "$FORMAT" \
            "$URL" \
            -o "downloads/%(title)s.%(ext)s"

          ls -lh downloads

      # ==============================
      # DETECT FILE SIZE
      # ==============================
      - name: Detect File Size
        id: size
        run: |
          FILE=$(ls downloads | head -n1)
          SIZE=$(stat -c%s "downloads/$FILE")

          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      # ==============================
      # SMALL FILE → REPO
      # ==============================
      - name: Upload Small File
        if: steps.size.outputs.size < 50000000
        run: |
          mkdir -p videos
          mv downloads/* videos/

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add videos
          git commit -m "Add downloaded video"
          git push

      # ==============================
      # MEDIUM FILE → RELEASE
      # ==============================
      - name: Upload Medium File
        if: steps.size.outputs.size >= 50000000 && steps.size.outputs.size < 2000000000
        uses: softprops/action-gh-release@v2
        with:
          tag_name: video-${{ github.run_number }}
          files: downloads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==============================
      # LARGE FILE → ARTIFACT
      # ==============================
      - name: Upload Large File
        if: steps.size.outputs.size >= 2000000000
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/
