name: Advanced YouTube Search

on:
  workflow_dispatch:
    inputs:
      query:
        description: "Search video on YouTube"
        required: true
        type: string

jobs:
  youtube-search:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg
          pip install -U yt-dlp

      - name: Make script executable
        run: chmod +x youtube_search.sh

      - name: Run YouTube Search
        run: |
          ./youtube_search.sh "${{ github.event.inputs.query }}"

      - name: Show Results
        run: |
          echo "=========== RESULTS ==========="
          cat youtube_results.txt

      - name: Upload Results File
        uses: actions/upload-artifact@v4
        with:
          name: youtube-search-results
          path: youtube_results.txt
